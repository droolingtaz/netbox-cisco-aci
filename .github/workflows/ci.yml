---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff yamllint
      - run: ruff check netbox_aci
      - run: ruff format --check netbox_aci
      - run: yamllint -s .github COMPATIBILITY.md

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        netbox-version: ["v4.5.0", "v4.6.0"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: netbox-aci

      - name: Check out NetBox ${{ matrix.netbox-version }}
        uses: actions/checkout@v4
        with:
          repository: netbox-community/netbox
          ref: ${{ matrix.netbox-version }}
          path: netbox

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install NetBox + plugin
        run: |
          cd netbox
          pip install -r requirements.txt
          cd ../netbox-aci
          pip install -e ".[test]"

      - name: Configure NetBox
        run: |
          cp netbox-aci/develop/configuration.py netbox/netbox/netbox/configuration.py

      - name: Run migrations
        run: |
          cd netbox
          python netbox/manage.py migrate

      - name: Run tests
        run: |
          cd netbox-aci
          pytest -v

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.netbox-version == 'v4.6.0'
        uses: codecov/codecov-action@v4
        with:
          files: ./netbox-aci/.coverage
          fail_ci_if_error: false
