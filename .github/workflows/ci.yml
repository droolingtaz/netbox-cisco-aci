---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin ruff so local + CI agree on formatter output. Bump together.
      - run: pip install ruff==0.15.14 yamllint==1.38.0
      - run: ruff check netbox_cisco_aci
      - run: ruff format --check netbox_cisco_aci
      # yamllint only — COMPATIBILITY.md is markdown, not YAML.
      - run: yamllint -s .github

  cloud-compat:
    # Gates the plugin against patterns that would break on NetBox
    # Enterprise / NetBox Cloud (Kubernetes, multi-pod, immutable FS).
    # The full contract is documented in AGENTS.md under
    # "Cloud / Kubernetes compatibility (HARD CONTRACT)".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_cloud_compat.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # NetBox 4.5+ requires Python 3.12 — earlier Python versions
        # cannot even import the NetBox app, so they are excluded.
        python-version: ["3.12"]
        netbox-version: ["v4.5.0", "v4.6.0"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: netbox-cisco-aci

      - name: Check out NetBox ${{ matrix.netbox-version }}
        uses: actions/checkout@v4
        with:
          repository: netbox-community/netbox
          ref: ${{ matrix.netbox-version }}
          path: netbox

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install NetBox + plugin
        run: |
          cd netbox
          pip install -r requirements.txt
          cd ../netbox-cisco-aci
          pip install -e ".[test]"

      - name: Configure NetBox
        run: |
          cp netbox-cisco-aci/develop/configuration.py netbox/netbox/netbox/configuration.py

      - name: Run migrations
        run: |
          cd netbox
          python netbox/manage.py migrate

      - name: Run tests
        env:
          # pytest-django needs to be able to import the `netbox` Django
          # project. The checkout lives under netbox/netbox/ relative to
          # the workspace.
          PYTHONPATH: ${{ github.workspace }}/netbox/netbox
          DJANGO_SETTINGS_MODULE: netbox.settings
          NETBOX_CONFIGURATION: netbox.configuration
        run: |
          cd netbox-cisco-aci
          pytest -v

      - name: Upload coverage to Codecov
        # Upload from one matrix entry only to keep the Codecov picture
        # clean (the two matrix entries cover the same Python version
        # and produce the same line numbers — uploading both just spams
        # Codecov with duplicate reports).
        if: matrix.netbox-version == 'v4.6.0'
        uses: codecov/codecov-action@v5
        with:
          files: ./netbox-cisco-aci/coverage.xml
          flags: netbox-${{ matrix.netbox-version }}
          # Do not fail the build if Codecov is misconfigured or down —
          # coverage is observability, not a gate. The real coverage gate
          # is `--cov-fail-under=65` in pyproject.toml, which fails the
          # `test` job locally before we even reach the upload step.
          fail_ci_if_error: false
          # Token is optional for public repos; required for private.
          # The workflow tries the secret; if absent, codecov-action
          # falls back to tokenless OIDC where possible.
          token: ${{ secrets.CODECOV_TOKEN }}
